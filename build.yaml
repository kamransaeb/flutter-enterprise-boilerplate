global_options:
  # Freezed options
  freezed:
    options:
      union_key: runtimeType
      union_value_case: none
      mutable: false
      make_collections_unmodifiable: true
      map: false
      when: true
      maybeWhen: true
      mapOrNull: false
      whenOrNull: true

  # JSON serializable options
  json_serializable:
    options:
      explicit_to_json: true
      any_map: false
      checked: true
      disallow_unrecognized_keys: true
      generic_argument_factories: true

  # Retrofit options
  retrofit_generator:
    options:
      auto_cast_response: true
      generate_to_json: true
      serializable_class: true

  # AutoRoute options
  auto_route_generator:auto_route_generator:
    options:
      enable_cached_builds: true

  auto_route_generator:auto_router_generator:
    options:
      enable_cached_builds: true
      relative_imports: true

  # Injectable options (must match real builder id)
  injectable_generator:injectable_builder:
    options:
      prefer_relative_imports: true
      generate_for_dir:
        - lib
      auto_register: true
