targets:
  $default:
    sources:
      # Include files for build
      include:
        - $package$
        - lib/**
        - pubspec.*

      # Exclude files from build
      exclude:
        - "**/*.g.dart"
        - "**/*.freezed.dart"
        - "**/*.gr.dart"
        - "**/*.config.dart"
        - "**/generated/**"
        - "**/build/**"
        - "**/.dart_tool/**"
        - "test/**"
        - "integration_test/**"

    builders:
      # Freezed code generation
      freezed:
        enabled: true
        generate_for:
          - lib/**/*.dart
        options:
          union_key: type
          union_value_case: kebab

      # JSON serialization
      json_serializable:
        enabled: true
        generate_for:
          - lib/**/*.dart
        options:
          explicit_to_json: true
          any_map: false
          checked: true

      # Injectable code generation (use split builders; there is no
      # `injectable_generator:injectable_generator` builder key.)
      # package_name:builder_name
      injectable_generator:injectable_builder:
        enabled: true
        options:
          prefer_relative_imports: true

      injectable_generator:injectable_config_builder:
        enabled: true
        generate_for:
          - lib/infrastructure/di/injection.dart

      # Retrofit code generation
      retrofit_generator:
        enabled: true
        generate_for:
          - lib/features/**/data/api/*_api_client.dart
        options:
          auto_cast_response: true

      # AutoRoute – @RoutePage() scanner
      auto_route_generator:auto_route_generator:
        enabled: true
        generate_for:
          - lib/features/**/presentation/pages/**.dart
          - lib/core/**/pages/**.dart

      # AutoRoute – @AutoRouterConfig() router
      auto_route_generator:auto_router_generator:
        enabled: true
        generate_for:
          - lib/core/navigation/app_router.dart

