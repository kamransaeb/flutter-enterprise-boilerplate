name: flutter_enterprise_boilerplate
description: "Flutter Enterprise Boilerplate"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Core
  dartz: ^0.10.1
  equatable: ^2.0.5
  freezed_annotation: ^3.1.0
  get_it: ^9.2.0
  injectable: ^2.7.1+4
  json_annotation: ^4.9.0
  permission_handler: ^12.0.1
  logger: ^2.6.2
  synchronized: ^3.1.0
  
  # State Management
  flutter_bloc: ^9.1.1
  hydrated_bloc: ^10.1.1
  rxdart: ^0.28.0
  
  # Network 
  dio: ^5.9.0  
  retrofit: ^4.9.2
 
 
  # Local Storage
  shared_preferences: ^2.5.4
  hive: ^2.2.3
  path_provider: ^2.1.5
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^10.0.0
  
  # Firebase
  firebase_core: ^4.3.0
  firebase_analytics: ^12.1.0
  firebase_crashlytics: ^5.0.6
  firebase_remote_config: ^6.1.3  
  firebase_messaging: ^16.1.1
  flutter_local_notifications: ^17.2.3
  
  # Monitoring
  sentry_flutter: ^9.10.0

  flutter_dotenv: ^6.0.0
  
  # UI
  flutter_svg: ^2.2.3
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0

  # check version ***
  pinput: ^6.0.2
  dropdown_button2: ^2.3.9

  # Formz
  formz: ^0.8.0
  reactive_forms: ^18.2.2

  # Navigation
  # go_router: ^17.0.1
  auto_route: ^11.0.0
  
  # Utils
  intl: ^0.20.2
  # Localization
  easy_localization: ^3.0.8
  
  # Performance
  provider: ^6.1.1

  # Security
  encrypt: ^5.0.1
  local_auth: ^2.3.0
  
  # Animations
  lottie: ^3.3.3
  animations: ^2.2.0

  flutter_localizations:
    sdk: flutter
  url_launcher: ^6.2.1
  package_info_plus: ^9.0.0
  connectivity_plus: ^7.1.1
  internet_connection_checker_plus: ^2.9.1+2
  device_info_plus: ^12.3.0
  geolocator: ^13.0.2
  geocoding: ^2.2.0
  
  # Very Good Analysis
  very_good_analysis: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

# Code Generation
  build_runner: ^2.4.9
  json_serializable: ^6.11.2
  freezed: ^3.1.0
  injectable_generator: ^2.9.1
  retrofit_generator: ^10.2.1
  auto_route_generator: ^10.4.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

  # Analysis
  very_good_analysis: ^10.0.0

   # Testing
  mocktail: ^1.0.4
  bloc_test: ^10.0.0
  integration_test:
    sdk: flutter
  golden_toolkit: ^0.15.0

   # Coverage
  test_cov_console: ^0.2.2

  
flutter:
  # Localization
  generate: true
  uses-material-design: true

  assets:
     # Common assets
    - assets/animations/
    - assets/images/
    - assets/fonts/
    - assets/translations/
    - assets/sounds/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700