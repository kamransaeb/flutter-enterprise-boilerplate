name: CI Pipeline

# Continuous integration: analyze, test, and verify release builds.
# Deployment is handled by cd.yml after a successful main-branch CI run.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FLUTTER_VERSION: '3.x'

jobs:
  analyze:
    name: Analyze Code
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - run: chmod +x ./scripts/ci/setup_environment.sh ./scripts/quality/check_formatting.sh
      - run: ./scripts/ci/setup_environment.sh
      - run: flutter analyze --fatal-infos
      - run: ./scripts/quality/check_formatting.sh

  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - run: chmod +x ./scripts/ci/setup_environment.sh ./scripts/quality/generate_coverage.sh
      - run: ./scripts/ci/setup_environment.sh
      - run: ./scripts/quality/generate_coverage.sh

      - uses: codecov/codecov-action@v3
        with:
          file: ./coverage/lcov.info
          fail_ci_if_error: true

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: [analyze, test]

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - run: chmod +x ./scripts/ci/setup_environment.sh ./scripts/build/build_android.sh ./scripts/build/_common.sh
      - run: ./scripts/ci/setup_environment.sh
      - run: ./scripts/build/build_android.sh -f prod --skip-analyze --skip-test

      - uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: build/app/outputs/flutter-apk/

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    needs: [analyze, test]

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - run: chmod +x ./scripts/ci/setup_environment.sh ./scripts/build/build_ios.sh ./scripts/build/_common.sh
      - run: ./scripts/ci/setup_environment.sh
      - run: ./scripts/build/build_ios.sh -f prod --skip-analyze --skip-test --skip-pod-install

      - uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/ios/

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: [analyze, test]

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - run: chmod +x ./scripts/ci/setup_environment.sh ./scripts/build/build_web.sh ./scripts/build/_common.sh
      - run: ./scripts/ci/setup_environment.sh
      - run: ./scripts/build/build_web.sh -f prod --skip-analyze --skip-test

      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/
